# This rule is not used by the project secretderiver itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to secretderiver.lightjack.de resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: secretderiver
    app.kubernetes.io/managed-by: kustomize
  name: derivedsecret-viewer-role
rules:
- apiGroups:
  - secretderiver.lightjack.de
  resources:
  - derivedsecrets
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - secretderiver.lightjack.de
  resources:
  - derivedsecrets/status
  verbs:
  - get
