site_name: SecretDeriver Documentation
markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
theme:
  name: material
  palette:
    scheme: slate
    primary: teal
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.path
    - toc.follow
    - toc.integrate
    - content.action.edit
    - content.action.view
    - content.code.copy
nav:
  - Home: index.md
  - Installing:
    - Introduction: installing/index.md
    - Helm: installing/helm.md
  - Usage:
    - Getting Started: usage/getting-started.md
    - DerivedSecret Reference: usage/reference.md
    - Cross-Namespace References: usage/cross-namespace.md
  - Reference:
    - Status and Conditions: reference/status.md
    - Security: reference/security.md
repo_url: https://github.com/LightJack05/SecretDeriver
edit_uri: edit/main/docs/
plugins:
  - privacy
