name: Formatting Check

on: [pull_request]

jobs:
  format:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Install Nix
        uses: cachix/install-nix-action@v31.9.0
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Project Formatting
        run: nix develop --command go fmt ./...; if [[ -z "$(git status --porcelain=v1)" ]]; then echo "Project appears to be formatted correctly!"; else echo "Formatting is not aligned to go standard."; exit 1; fi
