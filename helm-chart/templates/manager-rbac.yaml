apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "secretderiver.fullname" . }}-manager-role
  labels:
  {{- include "secretderiver.labels" . | nindent 4 }}
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - create
  - get
  - list
  - update
  - watch
- apiGroups:
  - secretderiver.lightjack.de
  resources:
  - derivedsecrets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - secretderiver.lightjack.de
  resources:
  - derivedsecrets/finalizers
  verbs:
  - update
- apiGroups:
  - secretderiver.lightjack.de
  resources:
  - derivedsecrets/status
  verbs:
  - get
  - patch
  - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "secretderiver.fullname" . }}-manager-rolebinding
  labels:
  {{- include "secretderiver.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: '{{ include "secretderiver.fullname" . }}-manager-role'
subjects:
- kind: ServiceAccount
  name: '{{ include "secretderiver.serviceAccountName" . }}'
  namespace: '{{ .Release.Namespace }}'
