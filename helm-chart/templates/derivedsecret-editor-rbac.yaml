apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "secretderiver.fullname" . }}-derivedsecret-editor-role
  labels:
  {{- include "secretderiver.labels" . | nindent 4 }}
rules:
- apiGroups:
  - secretderiver.lightjack.de
  resources:
  - derivedsecrets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - secretderiver.lightjack.de
  resources:
  - derivedsecrets/status
  verbs:
  - get
